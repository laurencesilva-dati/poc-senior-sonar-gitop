apiVersion: v1
kind: ServiceAccount
metadata:
  name: shard-configurator
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shard-configurator-role
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shard-configurator-binding
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
  - kind: ServiceAccount
    name: shard-configurator
roleRef:
  kind: Role
  name: shard-configurator-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: configure-{{ .Values.shardId }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 120
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: shard-configurator
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      containers:
        - name: configurator
          image: bitnami/kubectl:1.30
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "=== Configurando shard {{ .Values.shardId }} ==="
              SONAR_URL="http://sonar-{{ .Values.shardId }}.sonar-shards.svc.cluster.local:9000"
              ROUTER_API="{{ .Values.routerApiUrl }}"
              NEW_PASS="Laurence-123"
              SVC_NAME="sonar-{{ .Values.shardId }}"
              NAMESPACE="sonar-shards"

              # 1. Aguardar SonarQube UP
              echo "[1/5] Aguardando SonarQube..."
              until wget -qO- "$SONAR_URL/api/system/status" 2>/dev/null | grep -q '"status":"UP"'; do
                sleep 5
              done
              echo "  SonarQube UP!"

              # 2. Trocar senha admin
              echo "[2/5] Trocando senha admin..."
              wget -qO- --post-data="login=admin&previousPassword=admin&password=$NEW_PASS" \
                --header="Authorization: Basic YWRtaW46YWRtaW4=" \
                "$SONAR_URL/api/users/change_password" 2>/dev/null || echo "  (senha ja trocada)"

              # 3. Gerar token
              echo "[3/5] Gerando token..."
              TOKEN=$(wget -qO- --post-data="name=router-token" \
                --header="Authorization: Basic YWRtaW46TGF1cmVuY2UtMTIz" \
                "$SONAR_URL/api/user_tokens/generate" 2>/dev/null | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
              echo "  Token: ${TOKEN:0:10}..."

              # 4. Obter URL do LoadBalancer via kubectl (simples e confiavel)
              echo "[4/5] Obtendo URL do LoadBalancer..."
              LB_HOST=""
              for i in $(seq 1 36); do
                LB_HOST=$(kubectl get svc $SVC_NAME -n $NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
                if [ -n "$LB_HOST" ]; then
                  echo "  LB: $LB_HOST"
                  break
                fi
                echo "  Aguardando LB... ($((i*5))s)"
                sleep 5
              done

              if [ -z "$LB_HOST" ]; then
                echo "  ERRO: LB nao ficou pronto em 3 min. Retentando..."
                exit 1
              fi

              EXTERNAL_URL="http://${LB_HOST}:9000"

              # 5. Registrar como READY no Router
              echo "[5/5] Registrando como READY: $EXTERNAL_URL"
              wget -qO- --post-data="{\"url\":\"$EXTERNAL_URL\",\"token\":\"$TOKEN\",\"name\":\"{{ .Values.shardName }}\",\"product_tags\":[{{- range $i, $t := .Values.productTags }}{{- if $i }},{{ end }}\"{{ $t }}\"{{- end }}]}" \
                --header="Content-Type: application/json" \
                "$ROUTER_API/shards/{{ .Values.shardId }}/ready" 2>/dev/null

              echo ""
              echo "=== DONE: {{ .Values.shardId }} READY at $EXTERNAL_URL ==="
